services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - finflow-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - finflow-network

  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - finflow-network

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - finflow-network

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
    depends_on:
      eureka-server:
        condition: service_started
      zipkin:
        condition: service_started
      auth-service:
        condition: service_started
      application-service:
        condition: service_started
      document-service:
        condition: service_started
      admin-service:
        condition: service_started
    restart: on-failure
    networks:
      - finflow-network

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      - DB_URL=jdbc:mysql://mysql-db:3306/finflow_auth?createDatabaseIfNotExist=true
      - DB_USER=root
      - DB_PASSWORD=password
      - EUREKA_URL=http://eureka-server:8761/eureka/
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_started
    restart: on-failure
    networks:
      - finflow-network

  application-service:
    build: ./application-service
    container_name: application-service
    ports:
      - "8082:8082"
    environment:
      - DB_URL=jdbc:mysql://mysql-db:3306/finflow_app?createDatabaseIfNotExist=true
      - DB_USER=root
      - DB_PASSWORD=password
      - EUREKA_URL=http://eureka-server:8761/eureka/
      - RABBITMQ_HOST=rabbitmq
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    restart: on-failure
    networks:
      - finflow-network

  document-service:
    build: ./document-service
    container_name: document-service
    ports:
      - "8083:8083"
    environment:
      - DB_URL=jdbc:mysql://mysql-db:3306/finflow_doc?createDatabaseIfNotExist=true
      - DB_USER=root
      - DB_PASSWORD=password
      - EUREKA_URL=http://eureka-server:8761/eureka/
      - RABBITMQ_HOST=rabbitmq
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    restart: on-failure
    networks:
      - finflow-network

  admin-service:
    build: ./admin-service
    container_name: admin-service
    ports:
      - "8084:8084"
    environment:
      - DB_URL=jdbc:mysql://mysql-db:3306/finflow_admin?createDatabaseIfNotExist=true
      - DB_USER=root
      - DB_PASSWORD=password
      - SERVICES_APPLICATION_SERVICE=http://application-service:8082
      - SERVICES_AUTH_SERVICE=http://auth-service:8081
      - EUREKA_URL=http://eureka-server:8761/eureka/
      - RABBITMQ_HOST=rabbitmq
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    restart: on-failure
    networks:
      - finflow-network

networks:
  finflow-network:
    driver: bridge

volumes:
  db_data:
