server:
  port: 8082

spring:
  application:
    name: application-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/finflow_app?createDatabaseIfNotExist=true}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

springdoc:
  api-docs:
    path: /applications/v3/api-docs
  swagger-ui:
    path: /applications/swagger-ui.html
