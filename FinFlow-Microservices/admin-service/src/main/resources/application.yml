server:
  port: 8084

spring:
  application:
    name: admin-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/finflow_admin?createDatabaseIfNotExist=true}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: guest
    password: guest

services:
  application-service: ${SERVICES_APPLICATION_SERVICE:http://localhost:8082}
  auth-service: ${SERVICES_AUTH_SERVICE:http://localhost:8081}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

springdoc:
  api-docs:
    path: /admin/v3/api-docs
  swagger-ui:
    path: /admin/swagger-ui.html

logging:
  pattern:
    correlation: '[${spring.application.name:},%X{traceId:-},%X{spanId:-}] '
