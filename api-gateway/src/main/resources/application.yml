server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:

        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/gateway/auth/**

        - id: application-service
          uri: http://localhost:8082
          predicates:
            - Path=/gateway/applications/**

        - id: document-service
          uri: http://localhost:8083
          predicates:
            - Path=/gateway/documents/**

        - id: admin-service
          uri: http://localhost:8084
          predicates:
            - Path=/gateway/admin/**